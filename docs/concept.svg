<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" fill="none">
  <rect width="640" height="360" fill="#8eb4c9"/>
  <rect x="80" y="60" width="480" height="240" rx="12" fill="#c49a6c" stroke="#6b4423" stroke-width="6"/>
  <rect x="100" y="80" width="440" height="200" rx="4" fill="#d4b896"/>
  <!-- maze walls -->
  <rect x="140" y="120" width="180" height="12" fill="#6b4423"/>
  <rect x="260" y="120" width="12" height="100" fill="#6b4423"/>
  <rect x="340" y="160" width="160" height="12" fill="#6b4423"/>
  <rect x="180" y="200" width="12" height="60" fill="#6b4423"/>
  <!-- holes -->
  <circle cx="220" cy="180" r="16" fill="#222"/>
  <circle cx="380" cy="130" r="16" fill="#222"/>
  <circle cx="420" cy="220" r="16" fill="#222"/>
  <!-- goal -->
  <circle cx="480" cy="240" r="20" fill="#33d96a" stroke="#1a8f3f" stroke-width="3"/>
  <!-- marble -->
  <circle cx="130" cy="250" r="14" fill="#e83030" stroke="#a01010" stroke-width="2"/>
  <text x="320" y="340" text-anchor="middle" font-family="sans-serif" font-size="18" fill="#fff">Tilt the board ’ roll the marble ’ avoid holes ’ reach the goal</text>
</svg>
