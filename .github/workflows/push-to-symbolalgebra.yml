name: Push to SymbolAlgebra

on:
  workflow_dispatch:

jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout DragonBox branch
        uses: actions/checkout@v4
        with:
          ref: cursor/algebra-dragon-setup-1ad2

      - name: Push to SymbolAlgebra
        env:
          TARGET_TOKEN: ${{ secrets.SYMBOL_ALGEBRA_TOKEN }}
        run: |
          if [ -z "$TARGET_TOKEN" ]; then
            echo "ERROR: Add SYMBOL_ALGEBRA_TOKEN secret to MarbleMazePan3D first."
            echo "GitHub → Settings → Developer settings → Personal access tokens → Generate (repo scope)"
            echo "Then: MarbleMazePan3D → Settings → Secrets → Actions → New secret → SYMBOL_ALGEBRA_TOKEN"
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote add target "https://x-access-token:${TARGET_TOKEN}@github.com/rwchaneyjr/SymbolAlgebra.git"
          git push target HEAD:main --force
